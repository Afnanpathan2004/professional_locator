name: professional_locator
description: "A new Flutter project."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.6

  # Firebase dependencies
  firebase_core: ^3.6.0       # Latest version of firebase_core
  firebase_auth: ^5.3.1       # Latest version for Firebase authentication
  cloud_firestore: ^5.5.0     # Use cloud_firestore to connect to Firebase Firestore
  firebase_storage: ^12.3.0   # If you need Firebase storage
  firebase_messaging: ^14.5.0 # For Firebase Cloud Messaging (notifications)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the Material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/      # Add your image assets here
    - assets/icons/       # Add icon assets here if you have any

  # Custom fonts section:
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700

  # For adding custom fonts from dependencies, see:
  # https://flutter.dev/custom-fonts/#from-packages
